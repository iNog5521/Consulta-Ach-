<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSULTA ACHĒ CE 2026</title>
    <style>
        :root { 
            --primary: #c70039; 
            --bg-magenta: #910a44; 
            --card-bg: #ffffff; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-magenta); 
            margin: 0; padding: 20px; min-height: 100vh;
        }

        .container { max-width: 1200px; margin: auto; }
        
        h2 { 
            color: white; 
            text-align: center; 
            margin-bottom: 30px; 
            font-weight: 900; 
            letter-spacing: 2px;
            font-size: 2.5rem;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2), 5px 5px 15px rgba(0,0,0,0.4);
        }

        .filter-bar { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; background: rgba(255, 255, 255, 0.95); 
            padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            margin-bottom: 35px;
            align-items: end;
        }
        
        .filter-group label { display: block; font-size: 11px; font-weight: 700; color: #444; margin-bottom: 5px; text-transform: uppercase; }
        
        select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; 
            background-color: white; cursor: pointer; font-size: 14px; outline: none;
            box-sizing: border-box;
        }

        .btn-limpar {
            background-color: #666;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            transition: background 0.3s;
            height: 45px;
        }

        .btn-limpar:hover {
            background-color: #333;
        }

        .initial-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 25px; 
            position: relative; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.05);
            display: none; 
        }
        
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }

        .setor-tag { 
            font-size: 10px; padding: 6px 14px; border-radius: 20px; 
            color: white; font-weight: 800; text-transform: uppercase;
            display: inline-block; margin-bottom: 12px;
        }

        .linha-container {
            position: absolute; top: 15px; right: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .linha-label {
            font-size: 8px;
            font-weight: 900;
            color: #999;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .linha-badge { 
            background: var(--primary); color: white; min-width: 36px; height: 36px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; font-weight: bold; font-size: 13px;
        }

        .gd-info {
            font-size: 9px; font-weight: 800; color: #777;
            text-transform: uppercase; margin-top: 6px; text-align: center;
            border-top: 1px solid #eee; padding-top: 2px;
        }
        
        .rep-name { font-size: 20px; font-weight: 800; color: #222; margin: 10px 0 5px 0; display: block; }
        .prod-label { font-size: 10px; color: #999; text-transform: uppercase; margin-top: 18px; display: block; font-weight: 800; }
        .prod-box { background-color: #fcfcfc; border: 1px solid #f0f0f0; border-radius: 8px; padding: 15px; margin-top: 6px; min-height: 110px; }
        .prod-list { font-size: 12px; color: #555; line-height: 1.6; text-align: left; }
        .no-results { grid-column: 1 / -1; text-align: center; padding: 40px; color: white; font-weight: bold; display: none; }

        /* ── WhatsApp ── */
        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            text-decoration: none;
            color: #128C7E;
            font-size: 13px;
            font-weight: 700;
            transition: opacity 0.2s;
        }
        .whatsapp-link:hover { opacity: 0.75; }
        .whatsapp-link svg { flex-shrink: 0; }
        .whatsapp-placeholder {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            color: #bbb;
            font-size: 13px;
            font-weight: 700;
        }
    </style>
</head>

    function buildWhatsapp(tel) {

        const formatted = tel.replace('55', '').replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');

    function updateProductList() {
        const linhaSel = document.getElementById('fLinha').value;
        const selectProd = document.getElementById('fProduto');
        selectProd.innerHTML = '<option value="">Selecione o Produto</option><option value="todos">Todos os Produtos</option>';
        
        let listaProdutos = [];
        if (linhaSel === "" || linhaSel === "todos") {
            Object.values(produtosPorLinha).forEach(p => { listaProdutos.push(...p.split(', ')); });
        } else {
            listaProdutos = produtosPorLinha[linhaSel].split(', ');
        }

        const produtosUnicos = [...new Set(listaProdutos)].sort();
        produtosUnicos.forEach(prod => {
            const opt = document.createElement('option');
            opt.value = prod.toLowerCase();
            opt.innerHTML = prod;
            selectProd.appendChild(opt);
        });
    }

    function filterCards() {

        const sLinha = document.getElementById('fLinha').value;
        const sRep = document.getElementById('fRep').value;
        const sProd = document.getElementById('fProduto').value.toLowerCase();

        const msgInicial = document.getElementById('msgInicial');
        const noResults = document.getElementById('noResults');
        
        const algumFiltroAtivo = sSetor !== "" || sLinha !== "" || sRep !== "" || sProd !== "";

        if (!algumFiltroAtivo) {
            cards.forEach(c => c.style.display = "none");
            msgInicial.style.display = "block";
            noResults.style.display = "none";
            return;
        }

        msgInicial.style.display = "none";
        let totalVisivel = 0;

        cards.forEach(card => {
            const mSetor = sSetor === "todos" || sSetor === "" || card.dataset.setor === sSetor;
            const mLinha = sLinha === "todos" || sLinha === "" || card.dataset.linha === sLinha;
            const mRep = sRep === "todos" || sRep === "" || card.dataset.rep === sRep;
            const mProd = sProd === "todos" || sProd === "" || card.dataset.produtos.includes(sProd);

            if (mSetor && mLinha && mRep && mProd) {
                card.style.display = "block";
                totalVisivel++;
            } else {
                card.style.display = "none";
            }
        });

        noResults.style.display = totalVisivel === 0 ? "block" : "none";
    }

    window.onload = init;
</script>
</body>
